name: Bug report
description: Report a bug in SD Maid
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve SD Maid.

        Please fill out as much info as possible.

        More info: https://github.com/d4rken-org/sdmaid-se/wiki/Bugs

  - type: textarea
    id: describe-the-bug
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened.
    validations:
      required: true

  - type: textarea
    id: to-reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      placeholder: e.g. Pixel 9
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Android version
      placeholder: e.g. Android 15
    validations:
      required: true

  - type: dropdown
    id: root-status
    attributes:
      label: Root status
      options:
        - Not rooted
        - Magisk
        - KernelSU
        - Shizuku / ADB only
        - Other
    validations:
      required: true

  - type: dropdown
    id: sdmaid-flavor
    attributes:
      label: SD Maid variant
      options:
        - Google Play
        - FOSS (F-Droid / GitHub)
    validations:
      required: true

  - type: input
    id: sdmaid-version
    attributes:
      label: SD Maid 2/SE version
      description: "Found in SD Maid: Settings > About"
      placeholder: e.g. v1.2.3-rc1
    validations:
      required: true

  - type: textarea
    id: debug-log
    attributes:
      label: Debug log
      description: |
        If you can reproduce the bug, record the event in a [debug log](https://github.com/d4rken-org/sdmaid-se/wiki/Bugs#debug-log).
      placeholder: Paste the debug log here or attach it.
      render: shell

  - type: textarea
    id: screenshots-video
    attributes:
      label: Screenshots/Video
      description: Add screenshots or a video if it helps explain the problem.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
